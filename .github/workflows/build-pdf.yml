name: Build rulebook and publish site

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install reportlab pypdf

      - name: Run the rulebook script
        run: python build_rulebook.py

      - name: Commit updated PDF to docs/
        run: |
          git config user.name "rulebook-bot"
          git config user.email "actions@github.com"
          git add docs/rulebook.pdf
          git diff --staged --quiet || git commit -m "Auto-rebuild rulebook PDF"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo (post-build)
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
